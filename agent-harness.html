<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>agent/harness</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #09090b;
  --bg2:      #0f0f12;
  --bg3:      #16161a;
  --bg4:      #1e1e24;
  --border:   #252530;
  --border2:  #2e2e3a;
  --text:     #c4c0b8;
  --dim:      #4e4e5a;
  --dim2:     #6a6a78;
  --amber:    #e8a030;
  --amber-lo: rgba(232,160,48,0.08);
  --amber-brd:rgba(232,160,48,0.3);
  --cyan:     #32d4b0;
  --cyan-lo:  rgba(50,212,176,0.06);
  --cyan-brd: rgba(50,212,176,0.25);
  --red:      #d95050;
  --blue:     #5888d8;
  --mono:     'JetBrains Mono', monospace;
  --display:  'Syne', sans-serif;
}

html.light {
  --bg:       #f5f4f0;
  --bg2:      #edece7;
  --bg3:      #e4e3de;
  --bg4:      #d8d7d1;
  --border:   #cccbc3;
  --border2:  #b5b4ac;
  --text:     #28271f;
  --dim:      #7a7870;
  --dim2:     #5e5d55;
  --amber:    #b86c10;
  --amber-lo: rgba(184,108,16,0.09);
  --amber-brd:rgba(184,108,16,0.28);
  --cyan:     #1a8f74;
  --cyan-lo:  rgba(26,143,116,0.07);
  --cyan-brd: rgba(26,143,116,0.25);
  --red:      #b83030;
  --blue:     #2d5aaa;
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── LAYOUT ─────────────────────────────────────── */
#app {
  display: grid;
  grid-template-rows: 42px auto auto 1fr;
  height: 100vh;
}

/* ── HEADER ─────────────────────────────────────── */
header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 18px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 10;
}

.logo {
  font-family: var(--display);
  font-size: 14px;
  font-weight: 800;
  letter-spacing: 0.18em;
  color: var(--amber);
  text-transform: uppercase;
  flex-shrink: 0;
}
.logo em { color: var(--dim2); font-style: normal; font-weight: 700; }

.header-sep {
  flex: 1;
  height: 1px;
  background: var(--border);
}

.status-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--dim2);
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 3px;
  transition: all 0.2s;
  flex-shrink: 0;
}
.status-chip::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--dim);
  transition: background 0.2s;
  flex-shrink: 0;
}
.status-chip.thinking { color: var(--amber); border-color: var(--amber-brd); }
.status-chip.thinking::before { background: var(--amber); box-shadow: 0 0 6px var(--amber); animation: pulse 1s infinite; }
.status-chip.running  { color: var(--cyan);  border-color: var(--cyan-brd);  }
.status-chip.running::before  { background: var(--cyan);  box-shadow: 0 0 6px var(--cyan); animation: pulse 0.6s infinite; }
.status-chip.error    { color: var(--red);   border-color: rgba(217,80,80,0.3); }
.status-chip.error::before    { background: var(--red); }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.turn-counter {
  font-size: 10.5px;
  color: var(--dim);
  letter-spacing: 0.06em;
  flex-shrink: 0;
}

/* ── MAIN PANELS ─────────────────────────────────── */
main {
  display: grid;
  grid-template-columns: 1fr 1fr 260px;
  overflow: hidden;
}

main.preview-hidden {
  grid-template-columns: 1fr 260px;
}

main.preview-hidden .panel-center {
  display: none;
}

/* ── LEFT: CONVERSATION ──────────────────────────── */
.panel-left {
  display: grid;
  grid-template-rows: 1fr auto;
  overflow: hidden;
  border-right: 1px solid var(--border);
}

.conversation {
  overflow-y: auto;
  padding: 16px 18px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  scroll-behavior: smooth;
}

.conversation::-webkit-scrollbar { width: 3px; }
.conversation::-webkit-scrollbar-track { background: transparent; }
.conversation::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* Messages */
.msg {
  display: flex;
  flex-direction: column;
  gap: 5px;
  animation: rise 0.18s ease both;
}

@keyframes rise {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: none; }
}

.msg-label {
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--dim);
  padding-left: 2px;
}

.msg.user  .msg-label { color: var(--amber); }
.msg.agent .msg-label { color: var(--cyan);  }
.msg.sys   .msg-label { color: var(--dim2);  }

.msg-bubble {
  padding: 10px 13px;
  border-radius: 3px;
  border: 1px solid var(--border);
  background: var(--bg3);
  font-size: 13px;
  line-height: 1.65;
  white-space: pre-wrap;
  word-break: break-word;
  color: var(--text);
}

.msg.user .msg-bubble {
  background: var(--amber-lo);
  border-color: var(--amber-brd);
  color: var(--amber);
}

.msg.sys .msg-bubble {
  color: var(--dim2);
  font-size: 12px;
}

/* Code block */
.code-wrap {
  border: 1px solid var(--border2);
  border-left: 2px solid var(--cyan-brd);
  border-radius: 3px;
  background: var(--bg2);
  overflow: hidden;
}

.code-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 5px 11px;
  border-bottom: 1px solid var(--border);
  background: var(--bg3);
}

.code-lang {
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--cyan);
}

.code-lines {
  font-size: 10px;
  color: var(--dim);
}

.code-pre {
  padding: 12px 14px;
  font-size: 11.5px;
  line-height: 1.75;
  color: var(--text);
  white-space: pre;
  overflow-x: auto;
  font-family: var(--mono);
}

.code-pre::-webkit-scrollbar { height: 3px; }
.code-pre::-webkit-scrollbar-thumb { background: var(--border2); }

/* ── INPUT AREA ──────────────────────────────────── */
.input-area {
  padding: 10px 14px;
  border-top: 1px solid var(--border);
  background: var(--bg2);
  display: flex;
  gap: 8px;
  align-items: flex-end;
}

.input-wrap {
  flex: 1;
  position: relative;
}

textarea#input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 3px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 12.5px;
  padding: 9px 11px;
  resize: none;
  min-height: 52px;
  max-height: 160px;
  line-height: 1.6;
  outline: none;
  transition: border-color 0.15s;
  display: block;
}

textarea#input:focus { border-color: var(--amber-brd); }
textarea#input::placeholder { color: var(--dim); }

.kbd-hint {
  position: absolute;
  bottom: 7px; right: 9px;
  font-size: 9px;
  color: var(--dim);
  pointer-events: none;
  letter-spacing: 0.05em;
}

#send {
  background: var(--amber);
  color: #000;
  border: none;
  border-radius: 3px;
  font-family: var(--display);
  font-weight: 800;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 0 16px;
  height: 52px;
  cursor: pointer;
  transition: background 0.15s, opacity 0.15s;
  flex-shrink: 0;
}

#send:hover:not(:disabled) { background: #f0b042; }
#send:disabled { opacity: 0.35; cursor: not-allowed; }

/* ── RIGHT PANEL ─────────────────────────────────── */
.panel-right {
  display: grid;
  grid-template-rows: 1fr 200px;
  overflow: hidden;
}

.sub-panel {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sub-panel + .sub-panel {
  border-top: 1px solid var(--border);
}

.panel-label {
  padding: 5px 12px;
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--dim);
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 7px;
}

.panel-label .count {
  background: var(--bg4);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 1px 6px;
  font-size: 9px;
  color: var(--dim2);
}

.panel-body {
  overflow-y: auto;
  flex: 1;
  padding: 6px 8px;
}

.panel-body::-webkit-scrollbar { width: 2px; }
.panel-body::-webkit-scrollbar-thumb { background: var(--border2); }

.panel-empty {
  padding: 10px 6px;
  color: var(--dim);
  font-size: 11px;
  font-style: italic;
}

/* ── EVENTS ──────────────────────────────────────── */
.ev {
  padding: 3px 5px;
  border-radius: 2px;
  font-size: 11px;
  line-height: 1.5;
  margin-bottom: 1px;
  word-break: break-all;
  animation: rise 0.12s ease;
  display: flex;
  gap: 5px;
}

.ev-icon { flex-shrink: 0; color: var(--dim); }
.ev-text { color: var(--dim2); }

.ev.progress .ev-icon { color: var(--blue); }
.ev.progress .ev-text { color: var(--dim2); }
.ev.result   .ev-icon { color: var(--cyan); }
.ev.result   .ev-text { color: var(--text); }
.ev.file_write .ev-icon { color: var(--amber); }
.ev.file_write .ev-text { color: var(--amber); }
.ev.file_read  .ev-icon { color: var(--dim2); }
.ev.file_read  .ev-text { color: var(--dim); }
.ev.done   .ev-icon { color: var(--cyan); }
.ev.done   .ev-text { color: var(--cyan); }
.ev.error  .ev-icon { color: var(--red); }
.ev.error  .ev-text { color: var(--red); }

/* ── VFS TREE ────────────────────────────────────── */
.vfs-dir {
  font-size: 9.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--dim);
  padding: 8px 6px 2px;
  font-weight: 600;
}

.vfs-dir:first-child { padding-top: 4px; }

.vfs-file {
  padding: 3px 6px 3px 10px;
  font-size: 11px;
  color: var(--dim2);
  border-radius: 2px;
  cursor: pointer;
  transition: background 0.1s, color 0.1s;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.vfs-file:hover { background: var(--bg4); color: var(--text); }
.vfs-file.dirty { color: var(--amber); }
.vfs-file .vfs-icon { flex-shrink: 0; font-size: 10px; }
.vfs-file .vfs-name { overflow: hidden; text-overflow: ellipsis; }
.vfs-file .vfs-preview-btn {
  flex-shrink: 0;
  margin-left: auto;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--dim);
  font-size: 11px;
  padding: 0 2px;
  opacity: 0;
  transition: opacity 0.15s;
  line-height: 1;
}
.vfs-file:hover .vfs-preview-btn { opacity: 1; }
.vfs-file .vfs-preview-btn:hover { color: var(--accent); }

/* ── FILE VIEWER MODAL ───────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.75);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  animation: rise 0.12s ease;
  padding: 20px;
}

.modal {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  width: min(90vw, 740px);
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 24px 60px rgba(0,0,0,0.6);
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--bg3);
  flex-shrink: 0;
}

.modal-path { font-size: 12px; color: var(--amber); }
.modal-size { font-size: 10px; color: var(--dim); }

.modal-close {
  background: none;
  border: none;
  color: var(--dim);
  cursor: pointer;
  font-size: 16px;
  padding: 2px 6px;
  border-radius: 2px;
  transition: color 0.1s, background 0.1s;
  line-height: 1;
}
.modal-close:hover { color: var(--text); background: var(--bg4); }

.modal-body {
  overflow: auto;
  padding: 14px 16px;
  flex: 1;
}

.modal-body pre {
  font-size: 12px;
  line-height: 1.75;
  white-space: pre-wrap;
  word-break: break-word;
  color: var(--text);
  font-family: var(--mono);
}

/* ── PREVIEW PANEL ───────────────────────────────── */
.panel-center {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-right: 1px solid var(--border);
}

.preview-toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  flex-shrink: 0;
}

.preview-toolbar .panel-label {
  border-bottom: none;
  padding: 0;
  flex-shrink: 0;
}

.preview-toolbar select {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 3px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 11px;
  padding: 3px 8px;
  outline: none;
  flex: 1;
  min-width: 0;
}

.preview-toolbar select:focus { border-color: var(--amber-brd); }

.preview-toolbar button {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 3px;
  color: var(--dim2);
  font-family: var(--mono);
  font-size: 10px;
  padding: 3px 8px;
  cursor: pointer;
  transition: color 0.1s, border-color 0.1s;
  flex-shrink: 0;
  letter-spacing: 0.05em;
}

.preview-toolbar button:hover { color: var(--text); border-color: var(--amber-brd); }
.preview-toolbar button.active { color: var(--cyan); border-color: var(--cyan-brd); }

.preview-frame {
  flex: 1;
  border: none;
  background: #fff;
}

.preview-empty {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--dim);
  font-size: 11px;
  font-style: italic;
  padding: 20px;
  text-align: center;
  line-height: 1.6;
}

/* ── PREVIEW TOGGLE ──────────────────────────────── */
.preview-toggle {
  background: none;
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--dim2);
  font-family: var(--mono);
  font-size: 10px;
  padding: 3px 8px;
  cursor: pointer;
  transition: color 0.1s, border-color 0.1s;
  flex-shrink: 0;
  letter-spacing: 0.06em;
}
.preview-toggle:hover { color: var(--text); border-color: var(--amber-brd); }
.preview-toggle.active { color: var(--cyan); border-color: var(--cyan-brd); }

.theme-toggle {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 3px;
  color: var(--dim2);
  font-family: var(--mono);
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 0.09em;
  padding: 4px 10px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
  flex-shrink: 0;
}
.theme-toggle:hover { color: var(--text); border-color: var(--amber-brd); }

/* ── GITHUB CONFIG ─────────────────────────────── */
.gh-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 12px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  font-size: 11px;
}
.scenarios-bar {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 12px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  flex-wrap: wrap;
}
.scenarios-label { color: var(--dim); letter-spacing: 0.06em; }
.scenario-btn {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 4px;
  color: var(--dim2); font-size: 11px; font-family: inherit;
  padding: 3px 10px; cursor: pointer; transition: color .1s, border-color .1s, background .1s;
}
.scenario-btn:hover { color: var(--text); border-color: var(--amber-brd); background: var(--bg3); }
.gh-bar input {
  background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
  color: var(--text); padding: 3px 8px; font-size: 11px; font-family: inherit;
}
.gh-bar input::placeholder { color: var(--dim); }
.gh-bar .gh-apikey { width: 200px; }
.gh-bar .gh-repo  { width: 180px; }
.gh-bar .gh-token { width: 140px; }
.gh-bar button {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 4px;
  color: var(--dim); padding: 3px 10px; font-size: 11px; cursor: pointer; font-family: inherit;
}
.gh-bar button:hover { color: var(--text); border-color: var(--cyan-brd); }
.gh-bar .gh-status { color: var(--dim); margin-left: auto; }
.gh-bar .gh-status.connected { color: var(--green, #7ec); }
</style>
</head>
<body>

<div id="app">
  <header>
    <div class="logo">agent<em>/harness</em></div>
    <div class="header-sep"></div>
    <a href="skills.html" style="font-size:10px;color:var(--dim2);text-decoration:none;letter-spacing:0.08em;padding:4px 8px;border:1px solid var(--border);border-radius:3px;transition:color .1s,border-color .1s;" onmouseover="this.style.color='var(--text)';this.style.borderColor='var(--amber-brd)'" onmouseout="this.style.color='var(--dim2)';this.style.borderColor='var(--border)'">⚡ skills</a>
    <a href="workflows.html" style="font-size:10px;color:var(--dim2);text-decoration:none;letter-spacing:0.08em;padding:4px 8px;border:1px solid var(--border);border-radius:3px;transition:color .1s,border-color .1s;" onmouseover="this.style.color='var(--text)';this.style.borderColor='var(--amber-brd)'" onmouseout="this.style.color='var(--dim2)';this.style.borderColor='var(--border)'">⬡ workflows</a>
    <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark mode">light</button>
    <button class="preview-toggle" id="preview-toggle" title="Toggle preview panel">preview</button>
    <div class="status-chip" id="status">idle</div>
    <div class="turn-counter" id="turn-counter">turn 0</div>
  </header>

  <div class="gh-bar">
    <span style="color:var(--dim);">Anthropic</span>
    <input class="gh-apikey" id="api-key" type="password" placeholder="sk-ant-… or sk-or-… API key" />
    <button id="api-key-set">set key</button>
    <span style="color:var(--border2);margin:0 4px;">│</span>
    <span style="color:var(--dim);">GitHub</span>
    <input class="gh-repo" id="gh-repo" placeholder="owner/repo@ref" />
    <input class="gh-token" id="gh-token" type="password" placeholder="token" />
    <button id="gh-connect">connect</button>
    <button id="gh-push" disabled>push</button>
    <span class="gh-status" id="gh-status">disconnected</span>
  </div>

  <!-- SCENARIOS bar -->
  <div class="scenarios-bar" id="scenarios-bar">
    <span class="scenarios-label">Scenarios:</span>
    <button class="scenario-btn" data-scenario="init">🔍 Init Workspace</button>
    <button class="scenario-btn" data-scenario="bugfix">🐛 Bug Fix → PR</button>
    <button class="scenario-btn" data-scenario="feature">✨ Feature → PR</button>
    <button class="scenario-btn" data-scenario="summarize">📋 Summarize Repo</button>
  </div>

  <main>
    <!-- LEFT: conversation -->
    <div class="panel-left">
      <div class="conversation" id="conversation"></div>
      <div class="input-area">
        <div class="input-wrap">
          <textarea id="input" placeholder="Describe a task for the agent..." rows="3"></textarea>
          <span class="kbd-hint">⌘↵ to run</span>
        </div>
        <button id="send">Run →</button>
      </div>
    </div>

    <!-- CENTER: component preview -->
    <div class="panel-center" id="panel-center">
      <div class="preview-toolbar">
        <div class="panel-label">Preview</div>
        <select id="preview-select"><option value="">— select file —</option></select>
        <button id="preview-render" title="Re-render current selection">↻ render</button>
        <button id="preview-src" title="Toggle source view">src</button>
      </div>
      <div class="preview-empty" id="preview-empty">Run a prompt to generate components.<br>HTML artifacts will appear here.</div>
      <iframe class="preview-frame" id="preview-frame" sandbox="allow-forms allow-scripts" style="display:none;"></iframe>
    </div>

    <!-- RIGHT: events + VFS -->
    <div class="panel-right">
      <div class="sub-panel">
        <div class="panel-label">
          Events
          <span class="count" id="event-count">0</span>
        </div>
        <div class="panel-body" id="events">
          <div class="panel-empty">No events yet.</div>
        </div>
      </div>
      <div class="sub-panel">
        <div class="panel-label">
          VFS
          <span class="count" id="vfs-count">0</span>
        </div>
        <div class="panel-body" id="vfs-tree">
          <div class="panel-empty">Empty — agent writes files here.</div>
        </div>
      </div>
    </div>
  </main>
</div>

<script type="module">

import { createVFS, execute, extractCode } from './src/agent-core.js';
import { runTurn, buildSkillIndex } from './src/agent-loop.js';
import { createGitHubClient, initFromGitHub, syncFromGitHub, commitToGitHub, parseGitHubRepo } from './src/github.js';
import { loadSession, saveSession, clearSession } from './src/session.js';
import { buildCreatePrompt, buildImprovePrompt, listWorkflows, runWorkflowSteps, runWorkflowRSI, buildWorkflowScorer } from './src/workflow-runner.js';
import { getLLMClient } from './src/llm-client.js';

// ════════════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════════════

const MODEL = 'claude-sonnet-4-20250514';

// ── API KEY (stored for llm-client.js to read) ──
// Auto-detects OpenRouter keys (sk-or-...) vs Anthropic keys (sk-ant-...)
function storeApiKey(apiKey) {
  if (!apiKey) return;
  if (apiKey.startsWith('sk-or-')) {
    localStorage.setItem('OPENROUTER_API_KEY', apiKey);
    localStorage.removeItem('ANTHROPIC_API_KEY');
  } else {
    localStorage.setItem('ANTHROPIC_API_KEY', apiKey);
    localStorage.removeItem('OPENROUTER_API_KEY');
  }
}

// ════════════════════════════════════════════════════
// UI
// ════════════════════════════════════════════════════

const convEl     = document.getElementById('conversation');
const eventsEl   = document.getElementById('events');
const vfsEl      = document.getElementById('vfs-tree');
const statusEl   = document.getElementById('status');
const turnEl     = document.getElementById('turn-counter');
const inputEl    = document.getElementById('input');
const sendBtn    = document.getElementById('send');
const evCount    = document.getElementById('event-count');
const vfsCount   = document.getElementById('vfs-count');

let eventTotal   = 0;
let firstEvent   = true;

function esc(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

const EV_ICONS = {
  progress:   '◆',
  result:     '→',
  file_write: '✦',
  file_read:  '◇',
  done:       '✓',
  blocked:    '⊘',
  error:      '✕',
  metric:     '▪',
  experiment: '◉',
};

const VFS_ICONS = {
  '/scratch/':   '~',
  '/artifacts/': '◈',
  '/memory/':    '♦',
  '/src/':       '◇',
  '/skills/':    '⚡',
};

function vfsIcon(path) {
  for (const [prefix, icon] of Object.entries(VFS_ICONS)) {
    if (path.startsWith(prefix)) return icon;
  }
  return '·';
}

const ui = {
  setStatus(s) {
    statusEl.textContent = s;
    statusEl.className = 'status-chip ' +
      (s === 'thinking' ? 'thinking' :
       s === 'running'  ? 'running'  :
       s === 'error'    ? 'error'    : '');
    sendBtn.disabled = s !== 'idle' && s !== 'error';
  },

  setTurn(n) {
    turnEl.textContent = `turn ${n}`;
  },

  addUserMsg(text) {
    const el = document.createElement('div');
    el.className = 'msg user';
    el.innerHTML = `<div class="msg-label">you</div>
      <div class="msg-bubble">${esc(text)}</div>`;
    convEl.appendChild(el);
    convEl.scrollTop = convEl.scrollHeight;
  },

  addSysMsg(text) {
    const el = document.createElement('div');
    el.className = 'msg sys';
    el.innerHTML = `<div class="msg-label">system</div>
      <div class="msg-bubble">${esc(text)}</div>`;
    convEl.appendChild(el);
    convEl.scrollTop = convEl.scrollHeight;
  },

  showCode(code) {
    const lines = code.split('\n').length;
    const el = document.createElement('div');
    el.className = 'msg agent';
    el.innerHTML = `
      <div class="msg-label">agent → executing</div>
      <div class="code-wrap">
        <div class="code-header">
          <span class="code-lang">javascript</span>
          <span class="code-lines">${lines} line${lines !== 1 ? 's' : ''}</span>
        </div>
        <pre class="code-pre">${esc(code)}</pre>
      </div>`;
    convEl.appendChild(el);
    convEl.scrollTop = convEl.scrollHeight;
  },

  emitEvent(ev) {
    if (firstEvent) {
      eventsEl.innerHTML = '';
      firstEvent = false;
    }

    eventTotal++;
    evCount.textContent = eventTotal;

    const icon = EV_ICONS[ev.type] ?? '·';
    let text = '';
    switch (ev.type) {
      case 'progress':   text = ev.message ?? ''; break;
      case 'result':     text = JSON.stringify(ev.value ?? null); break;
      case 'file_write': text = ev.path ?? ''; break;
      case 'file_read':  text = ev.path ?? ''; break;
      case 'done':       text = ev.message ?? 'done'; break;
      case 'blocked':    text = ev.reason ?? 'blocked'; break;
      case 'error':      text = ev.message ?? 'error'; break;
      case 'metric':     text = `${ev.name}: ${ev.value} ${ev.unit ?? ''}`; break;
      case 'experiment': text = `${ev.kept ? 'kept' : 'discarded'}: ${ev.reason ?? ''}`; break;
      default:           text = JSON.stringify(ev);
    }

    const el = document.createElement('div');
    el.className = `ev ${ev.type}`;
    el.innerHTML = `<span class="ev-icon">${icon}</span><span class="ev-text">${esc(text)}</span>`;
    eventsEl.appendChild(el);
    eventsEl.scrollTop = eventsEl.scrollHeight;

    // Mirror 'done' and 'blocked' into conversation
    if (ev.type === 'done' || ev.type === 'blocked') {
      const d = document.createElement('div');
      d.className = 'msg agent';
      const isBlocked = ev.type === 'blocked';
      const label = isBlocked ? 'agent → blocked' : 'agent → done';
      const style = isBlocked
        ? 'background:var(--red-lo,#2a1515);border-color:var(--red-brd,#7a2020);color:var(--red,#f87171);'
        : 'background:var(--cyan-lo);border-color:var(--cyan-brd);color:var(--cyan);';
      const msg = isBlocked ? (ev.reason ?? '') : (ev.message ?? '');
      d.innerHTML = `<div class="msg-label">${label}</div>
        <div class="msg-bubble" style="${style}">${esc(msg)}</div>`;
      convEl.appendChild(d);
      convEl.scrollTop = convEl.scrollHeight;
    }
  },

  refreshVFS(vfs) {
    const paths = vfs.list();
    vfsCount.textContent = paths.length;

    if (paths.length === 0) {
      vfsEl.innerHTML = '<div class="panel-empty">Empty.</div>';
      return;
    }

    // Group by top-level directory
    const groups = {};
    for (const p of paths) {
      const parts = p.split('/').filter(Boolean);
      const dir   = parts.length > 1 ? '/' + parts[0] + '/' : '/';
      if (!groups[dir]) groups[dir] = [];
      groups[dir].push(p);
    }

    let html = '';
    for (const [dir, filePaths] of Object.entries(groups)) {
      html += `<div class="vfs-dir">${esc(dir)}</div>`;
      for (const p of filePaths) {
        const name  = p.split('/').pop();
        const dirty = vfs.isDirty(p);
        const icon  = vfsIcon(p);
        html += `<div class="vfs-file ${dirty ? 'dirty' : ''}" data-path="${esc(p)}">
          <span class="vfs-icon">${icon}</span>
          <span class="vfs-name">${esc(name)}</span>
        
          <button class="vfs-preview-btn" data-path="${esc(p)}" title="Open in Preview" onclick="event.stopPropagation()">&#9654;</button></div>`;
      }
    }

    vfsEl.innerHTML = html;

    vfsEl.querySelectorAll('.vfs-file').forEach(el => {
      el.addEventListener('click', () => {
        const path    = el.dataset.path;
        const content = agentState.context.vfs.read(path) ?? '';
        const bytes   = new Blob([content]).size;
        showModal(path, content, bytes);
      });
    });
  },

  // ── UI adapter interface for runTurn ────────────

  onRetry(attempt, max) {
    this.setStatus(`retrying (${attempt}/${max})…`);
  },

  onTurnComplete(turn, vfs) {
    this.setStatus('idle');
    this.setTurn(turn);
    this.refreshVFS(vfs);
  },
};

function showModal(path, content, bytes) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <span class="modal-path">${esc(path)}</span>
        <span class="modal-size">${bytes} bytes</span>
        <button class="modal-close">✕</button>
      </div>
      <div class="modal-body"><pre>${esc(content)}</pre></div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('.modal-close').onclick = () => overlay.remove();
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.addEventListener('keydown', function esc(e) {
    if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', esc); }
  });
}

  // Preview button: open file directly in preview panel
  vfsEl.querySelectorAll('.vfs-preview-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const path = btn.dataset.path;
      const sel = document.getElementById('preview-select');
      if (![...sel.options].some(o => o.value === path)) {
        const opt = document.createElement('option');
        opt.value = path; opt.textContent = path;
        sel.appendChild(opt);
      }
      sel.value = path;
      sel.dispatchEvent(new Event('change'));
    });
  });

// ════════════════════════════════════════════════════
// VFS HYDRATION (load harness code into VFS for RSI)
// ════════════════════════════════════════════════════

async function hydrateHarness(vfs) {
  // Load harness source files (now live in src/)
  for (const f of ['agent-core.js', 'agent-loop.js']) {
    try {
      const content = await fetch(`src/${f}`).then(r => r.text());
      vfs.write(`/harness/${f}`, content);
      vfs.markClean(`/harness/${f}`);
    } catch { /* skip */ }
  }

  // Load artifacts + memory via manifest (generated by CLI harness)
  try {
    const manifest = await fetch('vfs-manifest.json').then(r => {
      if (!r.ok) throw new Error('no manifest');
      return r.json();
    });
    for (const f of (manifest.artifacts ?? [])) {
      try {
        const content = await fetch(`artifacts/${f}`).then(r => r.text());
        vfs.write(`/artifacts/${f}`, content);
        vfs.markClean(`/artifacts/${f}`);
      } catch { /* skip */ }
    }
    for (const f of (manifest.memory ?? [])) {
      try {
        const content = await fetch(`memory/${f}`).then(r => r.text());
        vfs.write(`/memory/${f}`, content);
        vfs.markClean(`/memory/${f}`);
      } catch { /* skip */ }
    }
    for (const f of (manifest.skills ?? [])) {
      try {
        const content = await fetch(`skills/${f}`).then(r => r.text());
        vfs.write(`/skills/${f}`, content);
        vfs.markClean(`/skills/${f}`);
      } catch { /* skip */ }
    }
  } catch { /* no manifest — skip artifact/memory/skills hydration */ }
}

// ════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════

const vfs = createVFS();
const BROWSER_WORKSPACE_ID = 'browser';

// ── API key UI ──
const apiKeyInput  = document.getElementById('api-key');
const apiKeySetBtn = document.getElementById('api-key-set');

// Restore saved API key (OpenRouter takes priority for display)
const savedApiKey = localStorage.getItem('OPENROUTER_API_KEY') || localStorage.getItem('ANTHROPIC_API_KEY') || '';
if (savedApiKey) apiKeyInput.value = savedApiKey;

function applyApiKey() {
  const key = apiKeyInput.value.trim();
  if (!key) return;
  storeApiKey(key);
  const provider = key.startsWith('sk-or-') ? 'OpenRouter (CORS-friendly)' : 'Anthropic (requires proxy on localhost)';
  ui.addSysMsg(`API key stored. Provider: ${provider}`);
}

apiKeySetBtn.addEventListener('click', applyApiKey);
apiKeyInput.addEventListener('keydown', e => { if (e.key === 'Enter') applyApiKey(); });

// ── GitHub state ──
let ghClient = null;
let ghConfig = null;
const ghRepoInput  = document.getElementById('gh-repo');
const ghTokenInput = document.getElementById('gh-token');
const ghConnectBtn = document.getElementById('gh-connect');
const ghPushBtn    = document.getElementById('gh-push');
const ghStatusEl   = document.getElementById('gh-status');

// Restore saved GitHub settings from localStorage
try {
  const saved = JSON.parse(localStorage.getItem('aaron-github') || 'null');
  if (saved) {
    ghRepoInput.value = saved.repo || '';
    ghTokenInput.value = saved.token || '';
  }
} catch { /* ignore */ }

// parseGitHubRepo imported from github.js

async function ghConnect() {
  const repoStr = ghRepoInput.value.trim();
  const token = ghTokenInput.value.trim();
  if (!repoStr || !token) {
    ui.addSysMsg('GitHub: enter owner/repo and token to connect.');
    return;
  }
  const cfg = parseGitHubRepo(repoStr);
  if (!cfg) {
    ui.addSysMsg('GitHub: invalid repo format. Use "owner/repo" or "owner/repo@ref".');
    return;
  }
  ghConfig = cfg;
  ghClient = createGitHubClient({ token });
  // Persist to localStorage (token in localStorage only)
  localStorage.setItem('aaron-github', JSON.stringify({ repo: repoStr, token }));
  ghStatusEl.textContent = `connecting to ${cfg.owner}/${cfg.repo}...`;

  try {
    const result = await initFromGitHub(cfg, vfs, ghClient, (ev) => ui.emitEvent(ev));
    ghStatusEl.textContent = `${cfg.owner}/${cfg.repo}@${cfg.ref} (${result.files} files)`;
    ghStatusEl.classList.add('connected');
    ghPushBtn.disabled = false;
    agentState.context.github = { owner: cfg.owner, repo: cfg.repo, ref: cfg.ref };
    ui.refreshVFS(vfs);
    ui.addSysMsg(`GitHub connected: ${result.files} files loaded from ${cfg.owner}/${cfg.repo}@${cfg.ref}`);
  } catch (e) {
    ghStatusEl.textContent = `error: ${e.message}`;
    ghStatusEl.classList.remove('connected');
    ghClient = null;
    ghConfig = null;
    ui.addSysMsg(`GitHub connection failed: ${e.message}`);
  }
}

async function ghPush() {
  if (!ghClient || !ghConfig) return;
  const prefixes = ['/src/', '/workflows/', '/artifacts/', '/memory/', '/scratch/'];
  let totalPushed = 0, totalConflicts = 0;
  try {
    for (const prefix of prefixes) {
      const dirty = vfs.list().filter(p => p.startsWith(prefix) && vfs.isDirty(p));
      if (dirty.length === 0) continue;
      const result = await commitToGitHub(vfs, ghClient, {
        owner: ghConfig.owner, repo: ghConfig.repo,
        branch: ghConfig.ref, message: 'Update from Aaron (browser)',
        pathPrefix: prefix,
      }, (ev) => ui.emitEvent(ev));
      totalPushed += result.pushed.length;
      totalConflicts += result.conflicts.length;
    }
    ui.addSysMsg(`Pushed ${totalPushed} file(s) to GitHub.${totalConflicts ? ` ${totalConflicts} conflict(s).` : ''}`);
  } catch (e) {
    ui.addSysMsg(`GitHub push failed: ${e.message}`);
  }
}

ghConnectBtn.addEventListener('click', ghConnect);
ghPushBtn.addEventListener('click', ghPush);

const agentState = {
  history: [],
  turn: 0,
  context: {
    vfs,
    fetch: (...args) => fetch(...args),
    emit: (ev) => ui.emitEvent(ev),
    approve: (msg) => window.confirm(`⚠️ Agent Authorization Required\n\n${msg}\n\nAllow execution?`),
    env: {
      // Route API calls through the local dev server proxy to avoid browser CORS restrictions.
      // The proxy forwards requests to api.anthropic.com server-side.
      // When deployed outside localhost, calls go directly to Anthropic.
      anthropicApiUrl: ['127.0.0.1', 'localhost'].includes(location.hostname)
        ? `${location.origin}/v1/messages`
        : 'https://api.anthropic.com/v1/messages',
    },
    workspaceId: BROWSER_WORKSPACE_ID,
    github: null,
    async commit(message = 'commit') {
      const dirty = vfs.list().filter(p => vfs.isDirty(p));
      // Push to GitHub if connected — /src/, /workflows/, /artifacts/, /memory/, /scratch/
      if (ghClient && ghConfig) {
        const ghPrefixes = ['/src/', '/workflows/', '/artifacts/', '/memory/', '/scratch/'];
        const ghDirty = dirty.filter(p => ghPrefixes.some(prefix => p.startsWith(prefix)));
        for (const prefix of ghPrefixes) {
          const prefixDirty = ghDirty.filter(p => p.startsWith(prefix));
          if (prefixDirty.length === 0) continue;
          try {
            await commitToGitHub(vfs, ghClient, {
              owner: ghConfig.owner, repo: ghConfig.repo,
              branch: ghConfig.ref, message, pathPrefix: prefix,
            }, (ev) => agentState.context.emit(ev));
          } catch { /* commitToGitHub logs via emit */ }
        }
      }
      for (const p of dirty) vfs.markClean(p);
      agentState.context.emit({ type: 'experiment', id: String(Date.now()), kept: true, reason: message });
      return dirty;
    },
  },
};

const deps = { execute, extractCode, ui, runTurn };

// Hydrate harness files into VFS, then auto-connect GitHub if credentials are saved
hydrateHarness(vfs).then(async () => {
  const savedSession = await loadSession(BROWSER_WORKSPACE_ID);
  if (savedSession) {
    for (const [path, entry] of Object.entries(savedSession.vfs || {})) {
      // entry is either a plain string (old sessions) or { content, sha, dirty } (new sessions)
      const content = typeof entry === 'string' ? entry : entry.content;
      const sha = typeof entry === 'string' ? null : entry.sha;
      vfs.write(path, content);
      if (sha) { vfs.setSHA(path, sha); vfs.markClean(path); }
    }
    agentState.history = savedSession.state?.history || [];
    agentState.turn = savedSession.state?.turn || 0;
  }

  // Build skill index for progressive disclosure in SYSTEM prompt
  agentState.context.skillIndex = buildSkillIndex(vfs);

  const saved = (() => { try { return JSON.parse(localStorage.getItem('aaron-github') || 'null'); } catch { return null; } })();
  if (saved?.repo && saved?.token) {
    const cfg = parseGitHubRepo(saved.repo);
    if (cfg) {
      ghConfig = cfg;
      ghClient = createGitHubClient({ token: saved.token });
      ghRepoInput.value = saved.repo;
      ghTokenInput.value = saved.token;
      ghStatusEl.textContent = `connecting to ${cfg.owner}/${cfg.repo}...`;

      try {
        // Use differential sync when a SHA cache exists, full fetch otherwise.
        // Pass SHA cache directly — VFS is empty at startup so vfs.setSHA() would be a no-op.
        const shaCache = (() => { try { return JSON.parse(localStorage.getItem('aaron-sha-cache') || '{}'); } catch { return {}; } })();
        const hasSHACache = Object.keys(shaCache).length > 0;
        const hydrateFn = hasSHACache ? syncFromGitHub : initFromGitHub;
        const result = await hydrateFn(cfg, vfs, ghClient, (ev) => ui.emitEvent(ev), shaCache);
        ghStatusEl.textContent = `${cfg.owner}/${cfg.repo}@${cfg.ref} (${result.files} files)`;
        ghStatusEl.classList.add('connected');
        ghPushBtn.disabled = false;
        agentState.context.github = { owner: cfg.owner, repo: cfg.repo, ref: cfg.ref };
        ui.refreshVFS(vfs);
        const msg = hasSHACache
          ? `GitHub synced: ${result.cached ?? result.files} cached, ${result.updated ?? 0} updated from ${cfg.owner}/${cfg.repo}@${cfg.ref}`
          : `GitHub connected: ${result.files} files loaded from ${cfg.owner}/${cfg.repo}@${cfg.ref}`;
        ui.addSysMsg(msg);

        // Persist SHA-only cache (few KB) for next reload — full VFS content is too large for localStorage
        try {
          const snap = vfs.snapshot ? vfs.snapshot() : {};
          const shaMap = {};
          for (const [p, meta] of Object.entries(snap)) { if (meta?.sha) shaMap[p] = meta.sha; }
          localStorage.setItem('aaron-sha-cache', JSON.stringify(shaMap));
        } catch { /* quota exceeded — cache unavailable */ }
      } catch (e) {
        ghStatusEl.textContent = `error: ${e.message}`;
        ghStatusEl.classList.remove('connected');
        ghClient = null; ghConfig = null;
        ui.addSysMsg(`GitHub connection failed: ${e.message}`);
      }
    }
    // Rebuild skill index after GitHub hydration
    agentState.context.skillIndex = buildSkillIndex(vfs);
  }

  if (savedSession) {
    ui.addSysMsg(`Session resumed. ${agentState.turn} turn(s) restored.`);
  } else if (!saved?.repo || !saved?.token) {
    const count = vfs.list().filter(p => !p.startsWith('/harness/')).length;
    const extra = count > 0 ? `\n${count} file(s) loaded from disk.` : '';
    ui.addSysMsg(
      'Harness ready.' + extra + '\n\n' +
      'Commands: :vfs  :cat /path  :workflow\n' +
      '  :workflow create <name> <goal>      — define a new workflow\n' +
      '  :workflow improve <name> <feedback> — revise step prompts\n' +
      '  :workflow rsi <name> [budget]       — iterate definition\n' +
      '  :workflow <name>                    — run it\n\n' +
      'Connect GitHub to sync workflows and memory across sessions.'
    );
  }
});

// Send
async function handleSend() {
  const msg = inputEl.value.trim();
  if (!msg || sendBtn.disabled) return;
  inputEl.value = '';
  inputEl.style.height = 'auto';

  // ── Built-in commands ─────────────────────────────
  if (msg === ':vfs') {
    const paths = vfs.list();
    if (paths.length === 0) { ui.addSysMsg('VFS is empty.'); return; }
    const lines = paths.map(p => {
      const size = vfs.size ? vfs.size(p) : (vfs.read(p) || '').length;
      const dirty = vfs.isDirty(p) ? ' *' : '';
      return `${p}  ${size}b${dirty}`;
    });
    ui.addSysMsg('VFS contents:\n' + lines.join('\n'));
    return;
  }

  if (msg.startsWith(':cat ')) {
    const path = msg.slice(5).trim();
    const content = vfs.read(path);
    if (content === null) { ui.addSysMsg(`Not found: ${path}`); return; }
    ui.addSysMsg(`${path}:\n\n${content}`);
    return;
  }

  if (msg === ':reset') {
    await clearSession();
    agentState.history = [];
    agentState.turn = 0;
    ui.addSysMsg('Persisted session cleared.');
    return;
  }

  if (msg === ':workflow' || msg.startsWith(':workflow ')) {
    const args = msg.slice(10).trim();

    // ── :workflow list (or bare :workflow) ──
    if (!args || args === 'list') {
      const workflows = listWorkflows(vfs);
      if (workflows.length === 0) {
        ui.addSysMsg('No workflows yet.\n\nCreate one:\n  :workflow create <name> <goal description>');
      } else {
        const lines = workflows.map(wf => {
          const status = wf.status === 'complete'    ? '✓ complete'
                       : wf.status === 'in-progress' ? `step: ${wf.currentStep}`
                       : 'not started';
          return `${wf.name}  [${status}]${wf.description ? '\n  ' + wf.description : ''}`;
        });
        ui.addSysMsg('Workflows:\n' + lines.join('\n\n') + '\n\n:workflow <name>                    — run\n:workflow create <name> <goal>      — create new\n:workflow improve <name> <feedback> — revise steps\n:workflow rsi <name> [budget]       — iterate definition');
      }
      return;
    }

    // ── :workflow create <name> <goal> ──
    if (args.startsWith('create ')) {
      const rest = args.slice(7).trim();
      const spaceIdx = rest.indexOf(' ');
      if (spaceIdx === -1) { ui.addSysMsg('Usage: :workflow create <name> <goal description>'); return; }
      const wfName = rest.slice(0, spaceIdx);
      const goal = rest.slice(spaceIdx + 1).trim();
      ui.addUserMsg(`:workflow create ${wfName} ${goal}`);
      await runTurn(buildCreatePrompt(wfName, goal), agentState, deps);
      return;
    }

    // ── :workflow improve <name> <feedback> ──
    if (args.startsWith('improve ')) {
      const rest = args.slice(8).trim();
      const spaceIdx = rest.indexOf(' ');
      if (spaceIdx === -1) { ui.addSysMsg('Usage: :workflow improve <name> <feedback>'); return; }
      const wfName = rest.slice(0, spaceIdx);
      const feedback = rest.slice(spaceIdx + 1).trim();
      if (!vfs.read(`/workflows/${wfName}.json`)) {
        ui.addSysMsg(`Workflow "${wfName}" not found.\n\nCreate it first:\n  :workflow create ${wfName} <goal>`);
        return;
      }
      ui.addUserMsg(`:workflow improve ${wfName} "${feedback}"`);
      await runTurn(buildImprovePrompt(wfName, feedback), agentState, deps);
      return;
    }

    // ── :workflow rsi <name> [budget] ──
    if (args.startsWith('rsi ')) {
      const rest = args.slice(4).trim();
      const parts = rest.split(/\s+/);
      const wfRsiName = parts[0];
      const budget = parseInt(parts[1], 10) || 3;
      if (!wfRsiName) { ui.addSysMsg('Usage: :workflow rsi <name> [budget]'); return; }
      if (!vfs.read(`/workflows/${wfRsiName}.json`)) {
        ui.addSysMsg(`Workflow "${wfRsiName}" not found.\n\nCreate it first:\n  :workflow create ${wfRsiName} <goal>`);
        return;
      }
      ui.addSysMsg(`Workflow RSI: ${wfRsiName} — ${budget} experiments (LLM scoring)…`);
      const scorer = buildWorkflowScorer(getLLMClient({ apiUrl: agentState.context.env.anthropicApiUrl }));
      const results = await runWorkflowRSI({ wfName: wfRsiName, budget, state: agentState, deps, scorer });
      const kept = results.filter(r => r.kept).length;
      ui.addSysMsg(`Workflow RSI complete: ${kept}/${results.length} experiments kept`);
      return;
    }

    // ── :workflow <name> — run or resume ──
    const wfName = args;
    const wfRaw = vfs.read(`/workflows/${wfName}.json`);
    if (!wfRaw) {
      ui.addSysMsg(`Workflow "${wfName}" not found.\n\nCreate it first:\n  :workflow create ${wfName} <goal description>`);
      return;
    }
    let wf;
    try { wf = JSON.parse(wfRaw); } catch { ui.addSysMsg(`Invalid workflow JSON: /workflows/${wfName}.json`); return; }

    const doneCount = (() => { try { return JSON.parse(vfs.read('/scratch/workflow-state.json') || 'null')?.completedSteps?.length ?? 0; } catch { return 0; } })();
    ui.addSysMsg(`Workflow: ${wfName} (${doneCount}/${wf.steps.length} steps done). Running steps…`);

    await runWorkflowSteps(wf, wfName, vfs, agentState, deps, {
      onStepDone: (id) => {
        ui.addSysMsg(`✓ [${id}] complete`);
        // Auto-preview latest artifact from this workflow
        const artifactPaths = vfs.list().filter(p => p.startsWith(`/artifacts/${wfName}/`) && isPreviewable(p));
        if (artifactPaths.length > 0) {
          refreshPreviewSelect();
          previewSelect.value = artifactPaths[artifactPaths.length - 1];
          renderPreview();
        }
      },
      onComplete: (name) => ui.addSysMsg(`✅ Workflow "${name}" complete!`),
      onUserMsg:  (text) => ui.addUserMsg(`[step] ${text.slice(0, 100)}…`),
    });
    return;
  }

  // ── Normal agent turn ─────────────────────────────
  ui.addUserMsg(msg);
  await runTurn(msg, agentState, deps);
  // Save only dirty VFS entries (agent-written files) — GitHub-fetched files are too large for localStorage
  const dirtyVfs = { snapshot: () => {
    const snap = {};
    for (const p of vfs.list()) { if (vfs.isDirty(p)) { const s = vfs.snapshot(); if (s[p]) snap[p] = s[p]; } }
    return snap;
  }};
  await saveSession(BROWSER_WORKSPACE_ID, agentState, dirtyVfs);
}

const mainEl         = document.querySelector('main');

// ── THEME ──────────────────────────────────────────
function applyTheme(light) {
  document.documentElement.classList.toggle('light', light);
  themeToggleBtn.textContent = light ? 'dark' : 'light';
  localStorage.setItem('aaron-theme', light ? 'light' : 'dark');
  if (showSource) renderPreview(); // re-render src view with new colors
}

const savedTheme = localStorage.getItem('aaron-theme');
const preferLight = savedTheme
  ? savedTheme === 'light'
  : window.matchMedia('(prefers-color-scheme: light)').matches;
applyTheme(preferLight);

themeToggleBtn.addEventListener('click', () => {
  applyTheme(!document.documentElement.classList.contains('light'));
});

// Toggle preview panel visibility
previewToggle.addEventListener('click', () => {
  mainEl.classList.toggle('preview-hidden');
  previewToggle.classList.toggle('active', !mainEl.classList.contains('preview-hidden'));
});

// Start with preview visible

// Detect previewable files: .html, .js (component modules), .css
function isPreviewable(path) {
  if (!path.startsWith('/artifacts/') && !path.startsWith('/scratch/')) return false;
  return /\.(html|js|css|md)$/.test(path);
}

// Rebuild the file select dropdown from VFS
function refreshPreviewSelect() {
  const current = previewSelect.value;
  const paths = vfs.list().filter(isPreviewable);
  previewSelect.innerHTML = '<option value="">— select file —</option>';
  for (const p of paths) {
    const opt = document.createElement('option');
    opt.value = p;
    opt.textContent = p;
    previewSelect.appendChild(opt);
  }
  // Restore selection if still valid, or auto-select newest component
  if (paths.includes(current)) {
    previewSelect.value = current;
  } else if (paths.length > 0) {
    // Prefer component files, then html, then anything
    const comp = paths.find(p => p.includes('component')) ||
                 paths.find(p => p.endsWith('.html')) ||
                 paths[paths.length - 1];
    previewSelect.value = comp;
  }
}

// Build a full HTML document from VFS artifacts for preview
function buildPreviewHTML(selectedPath) {
  const content = vfs.read(selectedPath);
  if (!content) return '<html><body><p>File not found.</p></body></html>';

  // If it's a raw HTML file, render directly
  if (selectedPath.endsWith('.html')) {
    return content;
  }

  // If it's a markdown file, render simple preview
  if (selectedPath.endsWith('.md')) {
    const escaped = content
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    return `<!DOCTYPE html>
<html><head><style>
  body { font-family: system-ui, sans-serif; max-width: 720px; margin: 20px auto; padding: 0 20px; line-height: 1.6; color: #1a1a1a; }
  pre { background: #f4f4f4; padding: 12px; border-radius: 4px; overflow-x: auto; }
  code { background: #f4f4f4; padding: 2px 5px; border-radius: 3px; font-size: 0.9em; }
</style></head><body><pre>${escaped}</pre></body></html>`;
  }

  // If it's CSS, show a simple style demo
  if (selectedPath.endsWith('.css')) {
    return `<!DOCTYPE html>
<html><head><style>${content}</style></head>
<body><p>CSS loaded. Add HTML elements to see the styles.</p></body></html>`;
  }

  // For JS component modules: evaluate them and render the output
  // Collect related files from artifacts
  const allPaths = vfs.list().filter(p => p.startsWith('/artifacts/'));

  // Gather all CSS files
  let allCSS = '';
  for (const p of allPaths) {
    if (p.endsWith('.css')) {
      allCSS += (vfs.read(p) || '') + '\n';
    }
  }

  // Gather all JS modules (build dependency order: state first, then components, then tests/app)
  const jsFiles = allPaths
    .filter(p => p.endsWith('.js') && !p.endsWith('.test.js'))
    .sort((a, b) => {
      // state/util files first, then component files, then app files
      const order = f => {
        if (f.includes('state') || f.includes('util')) return 0;
        if (f.includes('component') || f.includes('item') || f.includes('list')) return 1;
        return 2;
      };
      return order(a) - order(b);
    });

  // Build a script that evaluates all the modules and renders
  let evalScript = '';
  for (const p of jsFiles) {
    const src = vfs.read(p);
    if (!src) continue;
    // Remove export keywords so it runs as plain script
    const cleaned = src
      .replace(/^\s*export\s+(const|let|var|function|async\s+function|class)\s/gm, '$1 ')
      .replace(/^\s*export\s+default\s+/gm, 'const _default = ')
      .replace(/^\s*export\s*\{[^}]*\}\s*;?\s*$/gm, '');
    evalScript += `// === ${p} ===\n${cleaned}\n\n`;
  }

  // Try to render: look for common app/render functions
  evalScript += `
// Auto-render: try known component patterns
try {
  let html = '';
  // Look for TodoApp or similar top-level components
  if (typeof TodoApp === 'function') {
    const state = typeof createTodoState === 'function' ? createTodoState() : { todos: [], nextId: 1 };
    // Add sample data
    let s = state;
    if (typeof addTodo === 'function') {
      s = addTodo(s, 'Build something awesome');
      s = addTodo(s, 'Test the components');
      s = addTodo(s, 'Ship it!');
      if (typeof toggleTodo === 'function') s = toggleTodo(s, 1);
    }
    html = TodoApp({ state: s, handlers: {} });
  } else if (typeof App === 'function') {
    html = App({});
  } else if (typeof render === 'function') {
    html = render();
  } else {
    // Try all exported functions that look like components (start with uppercase)
    const comps = [];
    ${jsFiles.map(p => {
      const src = vfs.read(p) || '';
      const fns = [...src.matchAll(/(?:export\s+)?(?:const|function)\s+([A-Z]\w+)/g)].map(m => m[1]);
      return fns.map(fn => `if (typeof ${fn} === 'function') comps.push(['${fn}', ${fn}]);`).join('\n    ');
    }).join('\n    ')}

    if (comps.length > 0) {
      html = '<div style="display:flex;flex-direction:column;gap:20px;">';
      for (const [name, fn] of comps) {
        try {
          const result = fn({});
          if (typeof result === 'string') {
            html += '<div><h3 style="font-family:monospace;color:#666;font-size:12px;margin-bottom:8px;">&lt;' + name + '/&gt;</h3>' + result + '</div>';
          }
        } catch(e) {}
      }
      html += '</div>';
    } else {
      html = '<p style="color:#999;font-style:italic;">No renderable components found. Select a .html file or a component module.</p>';
    }
  }

  document.getElementById('app').innerHTML = html;
} catch(e) {
  document.getElementById('app').innerHTML = '<pre style="color:red;padding:20px;">' + e.message + '\\n' + e.stack + '</pre>';
}
`;

  return `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; padding: 20px; line-height: 1.5; color: #1a1a1a; }
  ${allCSS}
</style>
</head>
<body>
<div id="app"></div>
<script>
${evalScript}
<` + `/script>
</body>
</html>`;
}

function renderPreview() {
  const path = previewSelect.value;
  if (!path) {
    previewFrame.style.display = 'none';
    previewEmpty.style.display = 'flex';
    return;
  }

  const content = vfs.read(path);
  if (!content) {
    previewFrame.style.display = 'none';
    previewEmpty.style.display = 'flex';
    return;
  }

  previewEmpty.style.display = 'none';
  previewFrame.style.display = 'block';

  if (showSource) {
    // Show raw source in the iframe — respect current theme
    const isLight = document.documentElement.classList.contains('light');
    const srcBg   = isLight ? '#edece7' : '#0f0f12';
    const srcFg   = isLight ? '#28271f' : '#c4c0b8';
    const escaped = content
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const srcHTML = `<!DOCTYPE html>
<html><head><style>
  body { background: ${srcBg}; color: ${srcFg}; font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 16px; margin: 0; }
  pre { white-space: pre-wrap; word-break: break-word; line-height: 1.75; }
</style></head><body><pre>${escaped}</pre></body></html>`;
    previewFrame.srcdoc = srcHTML;
  } else {
    previewFrame.srcdoc = buildPreviewHTML(path);
  }
}

// Wire up controls
previewSelect.addEventListener('change', () => { showSource = false; previewSrc.classList.remove('active'); renderPreview(); });
previewRender.addEventListener('click', renderPreview);
previewSrc.addEventListener('click', () => {
  showSource = !showSource;
  previewSrc.classList.toggle('active', showSource);
  renderPreview();
});

const origOnTurnComplete = ui.onTurnComplete.bind(ui);
ui.onTurnComplete = function(turn, vfsRef) {

ui.emitEvent = function(ev) {

    refreshPreviewSelect();

};

(function(){
  const _t=document.getElementById('vfs-tree');
  if(!_t)return;
  const _a=()=>{
    _t.querySelectorAll('.vfs-file:not(.preview-patched)').forEach(el=>{
      el.classList.add('preview-patched');
      const p=el.dataset.path; if(!p)return;
      const b=document.createElement('button');
      b.className='vfs-preview-btn'; b.title='Open in Preview';
      b.textContent='\u25b6'; b.dataset.path=p;
      b.addEventListener('click',e=>{
        e.stopPropagation();
        const s=document.getElementById('preview-select');
        if(![...s.options].some(o=>o.value===p)){const o=document.createElement('option');o.value=p;o.textContent=p;s.appendChild(o);}
        s.value=p; s.dispatchEvent(new Event('change'));
      });
      el.appendChild(b);
    });
  };
  new MutationObserver(()=>setTimeout(_a,0)).observe(_t,{childList:true,subtree:true});
})();
